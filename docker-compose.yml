services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: .
      target: server
    ports:
      - "5000:5000"
    env_file:
      - server/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/artel
      PORT: 5000
    depends_on:
      - mongo

  client:
    build:
      context: .
      target: client
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  mongo_data:
